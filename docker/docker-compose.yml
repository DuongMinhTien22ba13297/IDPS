services:
  suricata:
    build:
      context: ./suricata
    container_name: suricata
    network_mode: 'host'
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
    environment:
      # Lắng nghe trên cả ens33 (external) và br-idps (internal plaintext)
      - IFACE=ens33 -i br-idps
    volumes:
      - ../logs/suricata:/var/log/suricata
    depends_on:
      - nginx

  autodefense:
    build:
      context: ./autodefense
    container_name: autodefense
    network_mode: 'host'
    cap_add:
      - NET_ADMIN
    restart: always
    tmpfs:
      - /tmp:size=10M,mode=1777
    volumes:
      - ../src:/app/src:ro
      - ../models:/app/models:ro
      - ../logs:/app/logs
      - ../configs:/app/configs
      - ../logs/suricata:/app/logs/suricata:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - loki
      - suricata

  nginx:
    build:
      context: ./nginx
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - idps_net

  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    restart: always
    ports:
      - "3001:3000"
    networks:
      - idps_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "192.168.226.151:3100:3100"
    user: "0:0"
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    volumes:
      - ./loki/data:/loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "192.168.226.151:3000:3000"
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - loki
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

networks:
  idps_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-idps
